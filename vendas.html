<!DOCTYPE html>
<html>
<head>
    <title>Registrar Vendas</title>
</head>
<body>
    <h1>Registrar Venda</h1>
    <form method="POST">
        Produto: <input type="text" name="produto" required><br>
        Valor: <input type="number" step="0.01" name="valor" required><br>
        <button type="submit">Adicionar</button>
    </form>

    <h2>Vendas registradas</h2>
    <ul>
        {% for v in vendas %}
        <li>{{ v.produto }} - R$ {{ v.valor }}</li>
        {% endfor %}
    </ul>
</body>
</html>
