<!DOCTYPE html>
<html>
<head>
    <title>Registrar Fiado</title>
</head>
<body>
    <h1>Registrar Fiado</h1>
    <form method="POST">
        Cliente: <input type="text" name="cliente" required><br>
        Valor: <input type="number" step="0.01" name="valor" required><br>
        <button type="submit">Adicionar</button>
    </form>

    <h2>Fiados registrados</h2>
    <ul>
        {% for f in fiados %}
        <li>{{ f.cliente }} - R$ {{ f.valor }}</li>
        {% endfor %}
    </ul>
</body>
</html>
